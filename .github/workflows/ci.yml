name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Verify public repo (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      CI: "true"
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Public leak scan
        shell: bash
        run: |
          set -euo pipefail
          if git ls-files | grep -E '^(docs/obsidian-|scripts/obsidian-|\.wrapup/)'; then
            echo "Private migration artifacts are tracked."
            exit 1
          fi
          private_patterns=(
            "/Users/"'HQ'
            "Personal "'Obsidian'
            "Lucas Paul "'Chatham'
            "__co"'dex'
            "Documents/RemNoteConnect/"'Backups'
            "8"'40'
            "7"'53'
            "4"'76'
          )
          for pattern in "${private_patterns[@]}"; do
            if git grep -n -F -- "$pattern"; then
              echo "Private path/content marker found in tracked files."
              exit 1
            fi
          done

      - name: Package script integrity
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const tracked = new Set(
            require("child_process")
              .execFileSync("git", ["ls-files"], { encoding: "utf8" })
              .trim()
              .split("\n")
              .filter(Boolean)
          );
          const missing = [];
          for (const [name, command] of Object.entries(pkg.scripts ?? {})) {
            const matches = [...command.matchAll(/(?:^|\s)node\s+(scripts\/[^\s"']+)/g)];
            for (const match of matches) {
              if (!tracked.has(match[1])) missing.push(`${name} -> ${match[1]}`);
            }
          }
          if (missing.length) {
            console.error(missing.join("\n"));
            process.exit(1);
          }
          console.log(`script integrity ok (${Object.keys(pkg.scripts ?? {}).length} scripts)`);
          NODE

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Plugin tests
        run: pnpm --filter @remnoteconnect/plugin test

      - name: Daemon tests
        run: pnpm --filter @remnoteconnect/daemon test

      - name: Build
        run: pnpm -r build

      - name: AnkiConnect contract
        run: pnpm check:anki-contract

      - name: AnkiConnect listener smoke
        run: pnpm check:anki-smoke

      - name: Token scan
        run: pnpm check:no-token

      - name: Static red-team checks
        run: pnpm check:redteam

  required:
    name: Verify public repo
    if: ${{ always() }}
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Require every platform verification
        if: ${{ needs.verify.result != 'success' }}
        run: exit 1
